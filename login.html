<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Skincare Scan</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        
        <header class="header">
            <div class="logo-group">
                <h1 class="logo-title">Skincare</h1>
                <h2 class="logo-subtitle">Scan</h2>
            </div>
            
            <div class="auth-buttons">
                <a href="login.html" class="btn btn-login">Log In</a>
                <a href="register.html" class="btn btn-register">Register</a>
            </div>
        </header>

        <nav class="navbar">
            <a href="index.html" class="nav-item"><span class="nav-icon">&#8859;</span> Home</a>
            <a href="quiz.html" class="nav-item"><span class="nav-icon">&#8859;</span> Quiz</a>
            <a href="scanner.html" class="nav-item"><span class="nav-icon">&#8859;</span> Scanner</a>
            <a href="about.html" class="nav-item"><span class="nav-icon">&#8859;</span> About Me</a>
            <a href="past-results.html" class="nav-item"><span class="nav-icon">&#8859;</span> Past Results</a>
        </nav>

        <main class="main-content">
            <div class="form-card">
                <h3 class="card-title">Welcome Back</h3>
                <!-- Standard HTML form submitting to index.html -->
                <form action="index.html">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn btn-submit">Log In</button>
                </form>
            </div>
        </main>

        <footer class="footer">
            <h1 class="logo-title footer-logo">Skincare</h1>
        </footer>
        
    </div>
</body>
</html>
